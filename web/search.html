<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#f2f4f7"/>
<title>先机 · 搜索</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="theme.js"></script>
<link rel="stylesheet" href="theme.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"/>
</head>
<body class="bg-background text-on-surface antialiased pb-12">
<div class="max-w-[480px] mx-auto w-full min-h-screen">

  <header class="flex items-center gap-2 px-margin-mobile pt-5 pb-3">
    <button onclick="history.back()" class="w-9 h-9 -ml-1 rounded-full flex items-center justify-center text-rock"><span class="material-symbols-outlined">arrow_back</span></button>
    <div class="flex items-center bg-surface border-hairline rounded-full overflow-hidden h-11 flex-grow px-3 focus-within:border-primary card-soft">
      <span class="material-symbols-outlined text-rock text-[20px]">search</span>
      <input id="q" autofocus placeholder="搜索企业名" class="w-full bg-transparent border-none text-body-md focus:ring-0 placeholder:text-rock/60 px-2"/>
    </div>
  </header>

  <main class="px-margin-mobile">
    <!-- 最近搜索 -->
    <div id="recentWrap" class="hidden">
      <div class="text-[11px] font-label-caps text-rock mb-3 mt-2">最近搜索</div>
      <div id="recent" class="flex flex-wrap gap-2 mb-6"></div>
    </div>
    <!-- 默认：热门 / 搜索后：结果 -->
    <div id="title" class="text-[11px] font-label-caps text-rock mb-3">关注范围内 · 意向分最高</div>
    <div id="results" class="flex flex-col gap-3"></div>
    <div id="state" class="text-center text-rock py-12 text-body-md"></div>
  </main>
</div>

<script src="data.js"></script>
<script>
  const q = document.getElementById("q"), results = document.getElementById("results"),
        state = document.getElementById("state"), title = document.getElementById("title");
  const RKEY = "xianji_recent";
  const getRecent = () => { try { return JSON.parse(localStorage.getItem(RKEY)) || []; } catch (e) { return []; } };
  function pushRecent(t) {
    let r = getRecent().filter(x => x !== t); r.unshift(t); r = r.slice(0, 8);
    localStorage.setItem(RKEY, JSON.stringify(r)); renderRecent();
  }
  function renderRecent() {
    const r = getRecent(), wrap = document.getElementById("recentWrap");
    if (!r.length) { wrap.classList.add("hidden"); return; }
    wrap.classList.remove("hidden");
    document.getElementById("recent").innerHTML = r.map(t =>
      `<button onclick="q.value='${t}';run('${t}')" class="px-3 py-1.5 rounded-full bg-surface border-hairline text-[13px] text-on-surface">${t}</button>`).join("");
  }
  async function showHot() {
    title.textContent = "关注范围内 · 意向分最高"; state.textContent = "加载中…"; results.innerHTML = "";
    try { const leads = await fetchLeads({}); state.textContent = "";
      results.innerHTML = leads.slice(0, 8).map(compactRow).join("");
    } catch (e) { state.textContent = "读取失败：" + e.message; }
  }
  let timer;
  async function run(term) {
    term = (term || "").trim();
    if (!term) { showHot(); return; }
    title.textContent = "搜索结果"; state.textContent = "搜索中…"; results.innerHTML = "";
    try {
      const r = await searchLeads(term);
      if (!r.length) { state.textContent = "没找到这家企业。它可能还没产生公开的落地信号。"; return; }
      state.textContent = ""; pushRecent(term);
      results.innerHTML = r.map(compactRow).join("");
    } catch (e) { state.textContent = "搜索失败：" + e.message; }
  }
  q.addEventListener("input", () => { clearTimeout(timer); timer = setTimeout(() => run(q.value), 300); });
  renderRecent(); showHot();
</script>
</body>
</html>
