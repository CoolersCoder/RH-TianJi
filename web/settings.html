<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#f2f4f7"/>
<title>先机 · 我的</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="theme.js"></script>
<link rel="stylesheet" href="theme.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"/>
<style>
  input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:9999px;background:#e2e6eb;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:9999px;background:#c8372d;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .rng-fill{background:linear-gradient(#c8372d,#c8372d) no-repeat;background-size:var(--p,70%) 100%}
</style>
</head>
<body class="bg-background text-on-surface antialiased pb-28">
<div class="max-w-[480px] mx-auto w-full min-h-screen">

  <header class="px-margin-mobile pt-7 pb-3">
    <h1 class="font-display-lg text-on-surface">我的</h1>
  </header>

  <main class="px-margin-mobile flex flex-col gap-6">
    <!-- 身份卡 -->
    <div class="bg-surface border-hairline card-soft rounded-2xl p-4 flex items-center gap-3">
      <div class="w-12 h-12 rounded-full bg-ink text-white flex items-center justify-center font-headline-sm font-semibold flex-shrink-0">招</div>
      <div class="flex-grow min-w-0">
        <div class="font-headline-sm font-semibold text-on-surface">招商人员 · 张</div>
        <div class="text-[12px] text-rock truncate">常州金坛经开区</div>
      </div>
      <span class="text-[11px] px-2.5 py-1 rounded-md bg-jade-soft text-jade border border-jade/30 flex-shrink-0">已认证</span>
    </div>
    <div id="groups" class="flex flex-col gap-6"></div>
    <div class="text-center font-label-caps text-rock/60 tracking-[0.3em] pt-2 pb-6">先机 · XIAN JI</div>
  </main>
</div>
<div id="nav"></div>

<script src="data.js"></script>
<script>
  document.getElementById("nav").innerHTML = bottomNav("settings.html");
  const THRESH_KEY = "xianji_thresh";
  const thresh = +(localStorage.getItem(THRESH_KEY) || 70);

  function row(inner, act) {
    return `<div class="flex items-center gap-3 px-4 py-3.5 ${act ? "cursor-pointer" : ""}" ${act || ""}>${inner}</div>`;
  }
  function navRow(label, val, href) {
    return row(`<span class="flex-grow text-body-md text-on-surface">${label}</span>
      <span class="text-body-md text-rock">${val || ""}</span>
      <span class="material-symbols-outlined text-rock text-[18px]">chevron_right</span>`, `onclick="location.href='${href}'"`);
  }
  function toggleRow(id, label, on) {
    return `<div class="flex items-center gap-3 px-4 py-3.5">
      <span class="flex-grow text-body-md text-on-surface">${label}</span>
      <button onclick="this.dataset.on=this.dataset.on==='1'?'0':'1';this.firstElementChild.className='absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all '+(this.dataset.on==='1'?'right-0.5':'left-0.5');this.className='w-11 h-6 rounded-full relative transition-colors flex-shrink-0 '+(this.dataset.on==='1'?'bg-primary':'bg-surface-variant')"
        data-on="${on ? 1 : 0}" class="w-11 h-6 rounded-full relative transition-colors flex-shrink-0 ${on ? "bg-primary" : "bg-surface-variant"}">
        <span class="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all ${on ? "right-0.5" : "left-0.5"}"></span>
      </button></div>`;
  }
  function group(title, rowsHTML) {
    return `<div><div class="text-[11px] font-label-caps text-rock mb-2 px-1">${title}</div>
      <div class="bg-surface border-hairline card-soft rounded-2xl divide-y divide-[#e2e6eb]">${rowsHTML}</div></div>`;
  }

  const threshRow = `<div class="px-4 py-3.5">
    <div class="flex items-center justify-between mb-3"><span class="text-body-md text-on-surface">提醒阈值</span>
      <span class="font-data-mono font-bold text-primary">≥ <span id="tv">${thresh}</span></span></div>
    <input type="range" min="40" max="90" step="5" value="${thresh}" class="w-full rng-fill" style="--p:${(thresh-40)/50*100}%"
      oninput="document.getElementById('tv').textContent=this.value;this.style.setProperty('--p',((this.value-40)/50*100)+'%');localStorage.setItem('${THRESH_KEY}',this.value)"/>
  </div>`;

  // 关注范围回显已存偏好(onboarding 写入 xianji_prefs);没设过就显示放开后的默认范围
  const _prefs = (() => { try { return JSON.parse(localStorage.getItem("xianji_prefs")) || {}; } catch (e) { return {}; } })();
  const _summary = (arr, dft) => (arr && arr.length) ? (arr.length > 4 ? arr.slice(0, 4).join(" · ") + ` 等${arr.length}项` : arr.join(" · ")) : dft;

  document.getElementById("groups").innerHTML =
    group("关注范围", navRow("关注省份", _summary(_prefs.prov, "全国"), "onboarding.html") + navRow("关注行业", _summary(_prefs.ind, "全部行业"), "onboarding.html")) +
    group("推送规则", toggleRow("a", "高置信即时提醒", true) + toggleRow("b", "每日早报 (09:00)", true) + threshRow + navRow("查看通知中心", "", "notifications.html")) +
    group("数据 · 账号",
      navRow("数据来源与合规", "", "about.html") +
      row(`<span class="flex-grow text-body-md text-on-surface">账号</span><span class="text-body-md text-rock">zhang@gov.example</span>`) +
      row(`<span class="flex-grow text-body-md text-on-surface">关于 先机</span><span class="text-body-md text-rock">v1.0.0</span>`) +
      row(`<span class="flex-grow text-body-md text-primary">清空本地关注清单</span>`, `onclick="if(confirm('清空本地关注清单?')){localStorage.removeItem(WATCH_KEY);alert('已清空')}"`));
</script>
</body>
</html>
